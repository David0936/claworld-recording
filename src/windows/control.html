<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClawCast Studio</title>
    <link rel="stylesheet" href="../styles/control.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <div class="brand-lockup">
            <img src="../assets/branding/logo-light.png" alt="爪播 ClawCast Studio" />
          </div>
          <p class="eyebrow">ClawCast Studio · 爪播</p>
          <h1>AI 创作者录播控制台</h1>
        </div>
        <div class="top-action-stack">
          <div class="top-actions">
            <button id="quickRecord" class="primary" type="button">快速录屏</button>
            <button id="quickSelectWindow" type="button">快速选窗口</button>
            <button id="toggleOverlay" class="primary">显示名片</button>
            <button id="togglePrompter">显示提词器</button>
            <button id="resetPositions">重置位置</button>
            <button id="checkUpdate">检查更新</button>
            <button id="runUpdate">一键更新</button>
            <button id="restartApp" disabled>重启应用</button>
          </div>
          <p class="update-status" id="updateStatus">GitHub 同步：未检查</p>
        </div>
      </header>

      <section class="workspace">
        <aside class="preview-pane">
          <img class="preview-logo" src="../assets/branding/logo-dark.png" alt="爪播 ClawCast Studio" />
          <div class="mini-card" id="miniCard">
            <div class="mini-top" id="miniTop">
              <img src="../assets/branding/app-logo.png" alt="" />
              <span>ON AIR PROFILE</span>
            </div>
            <div class="mini-content">
              <div>
                <p class="mini-handle" id="miniHandle">AI 博主 IP / 项目开发记录</p>
                <h2 id="miniName">David</h2>
                <p class="miniHeadline" id="miniHeadline">土木转 AI 产品经理</p>
                <p class="miniBio" id="miniBio"></p>
              </div>
              <div class="mini-avatar">
                <img id="miniAvatar" alt="" />
                <span id="miniInitial">D</span>
              </div>
            </div>
            <div class="mini-cta" id="miniCta">关注我，一起从 0 到 1 做项目</div>
          </div>
          <div class="window-status">
            <span id="overlayStatus">名片已显示</span>
            <span id="prompterStatus">提词器已显示</span>
          </div>
        </aside>

        <section class="panel">
          <div class="tabs" role="tablist">
            <button class="tab active" data-tab="profile">个人名片</button>
            <button class="tab" data-tab="style">悬浮样式</button>
            <button class="tab" data-tab="recording">开始录屏</button>
            <button class="tab" data-tab="prompter">口播提词</button>
          </div>

          <form class="tab-panel active" id="profilePanel" data-panel="profile">
            <div class="grid two">
              <label>
                昵称
                <input id="name" type="text" />
              </label>
              <label>
                个人定位
                <input id="headline" type="text" />
              </label>
            </div>
            <label>
              小字标签
              <input id="handle" type="text" />
            </label>
            <label>
              简介
              <textarea id="bio" rows="5"></textarea>
            </label>
            <label>
              关注引导
              <input id="cta" type="text" />
            </label>
            <div class="grid two">
              <label class="toggle-line">
                <input id="useCamera" type="checkbox" />
                <span>使用摄像头</span>
              </label>
              <label class="toggle-line">
                <input id="mirrorCamera" type="checkbox" />
                <span>镜像摄像头</span>
              </label>
            </div>
            <div class="grid two">
              <label>
                摄像头来源
                <select id="cameraSource">
                  <option value="local">本电脑摄像头</option>
                  <option value="phone">手机摄像头</option>
                  <option value="manual">手动选择</option>
                </select>
              </label>
              <label>
                摄像头设备
                <select id="cameraDeviceId"></select>
              </label>
            </div>
            <label>
              头像图片
              <input id="avatarInput" type="file" accept="image/*" />
            </label>
          </form>

          <form class="tab-panel" id="stylePanel" data-panel="style">
            <div class="grid two">
              <label>
                名片大小
                <select id="size">
                  <option value="small">小</option>
                  <option value="medium">中</option>
                  <option value="large">大</option>
                </select>
              </label>
              <label>
                显示模式
                <select id="style">
                  <option value="record">录课模式</option>
                  <option value="clean">清晰模式</option>
                </select>
              </label>
              <label>
                主色
                <input id="accentColor" type="color" />
              </label>
              <label>
                文字色
                <input id="textColor" type="color" />
              </label>
            </div>
            <div class="grid two">
              <label class="toggle-line">
                <input id="overlayVisible" type="checkbox" />
                <span>显示名片窗口</span>
              </label>
              <label class="toggle-line">
                <input id="showCta" type="checkbox" />
                <span>显示关注引导</span>
              </label>
              <label class="toggle-line">
                <input id="alwaysOnTop" type="checkbox" />
                <span>名片置顶</span>
              </label>
              <label class="toggle-line">
                <input id="locked" type="checkbox" />
                <span>鼠标穿透（锁定位置）</span>
              </label>
            </div>
          </form>

          <form class="tab-panel" id="recordingPanel" data-panel="recording">
            <div class="quick-recording-bar">
              <button id="quickRecordInPanel" type="button" class="primary">一键录当前屏幕</button>
              <button id="quickSelectWindowInPanel" type="button">快速选择窗口</button>
            </div>
            <div class="recording-status" id="recordingStatus">
              <span id="recordingDot"></span>
              <strong id="recordingStatusTitle">未开始录屏</strong>
              <small id="recordingStatusDetail">选择屏幕、窗口或框选区域后点击开始。</small>
            </div>
            <div class="permission-panel">
              <div class="permission-card" id="screenPermissionCard">
                <span>屏幕录制</span>
                <strong id="screenPermissionText">检查中</strong>
              </div>
              <div class="permission-card" id="cameraPermissionCard">
                <span>摄像头</span>
                <strong id="cameraPermissionText">检查中</strong>
              </div>
              <div class="permission-card" id="micPermissionCard">
                <span>麦克风</span>
                <strong id="micPermissionText">检查中</strong>
              </div>
              <button id="refreshPermissions" type="button">刷新权限状态</button>
              <button id="restartAfterPermission" type="button">授权后重启 App</button>
            </div>
            <div class="grid two">
              <label>
                录制范围
                <select id="recordingMode">
                  <option value="screen">整个屏幕</option>
                  <option value="window">应用窗口</option>
                  <option value="region">框选区域</option>
                </select>
              </label>
              <label>
                帧率
                <select id="recordingFrameRate">
                  <option value="24">24 fps</option>
                  <option value="30">30 fps</option>
                  <option value="60">60 fps</option>
                </select>
              </label>
            </div>
            <label>
              屏幕或窗口
              <select id="recordingSourceId"></select>
            </label>
            <div class="source-picker" id="sourcePicker"></div>
            <div class="grid three recording-source-actions">
              <button id="refreshRecordingSources" type="button">刷新可录窗口</button>
              <button id="openScreenPrivacy" type="button">打开录屏权限设置</button>
              <button id="selectRecordingRegion" type="button">框选录制区域</button>
            </div>
            <div class="region-summary" id="regionSummary">未选择区域</div>
            <label class="toggle-line">
              <input id="includeMic" type="checkbox" />
              <span>同时录麦克风</span>
            </label>
            <div class="recording-actions">
              <button id="startRecording" type="button" class="primary">开始录屏</button>
              <button id="stopRecording" type="button" disabled>停止并保存</button>
              <button id="openRecordingFile" type="button" disabled>打开最近文件</button>
            </div>
          </form>

          <form class="tab-panel" id="prompterPanel" data-panel="prompter">
            <label>
              提词稿
              <textarea id="script" rows="10"></textarea>
            </label>
            <div class="grid two">
              <label>
                滚动速度
                <input id="speed" type="range" min="8" max="120" step="1" />
              </label>
              <label>
                字体大小
                <input id="fontSize" type="range" min="22" max="64" step="1" />
              </label>
              <label>
                透明度
                <input id="opacity" type="range" min="0.35" max="1" step="0.01" />
              </label>
              <label class="toggle-line">
                <input id="prompterVisible" type="checkbox" />
                <span>显示提词器</span>
              </label>
              <label class="toggle-line">
                <input id="protectedFromCapture" type="checkbox" />
                <span>防录屏保护</span>
              </label>
              <label class="toggle-line">
                <input id="clickThrough" type="checkbox" />
                <span>提词器鼠标穿透</span>
              </label>
            </div>
            <div class="prompt-actions">
              <button id="playPrompter" type="button" class="primary">开始滚动</button>
              <button id="pausePrompter" type="button">暂停</button>
              <button id="resetPrompter" type="button">回到开头</button>
            </div>
          </form>
        </section>
      </section>
    </main>
    <script src="../renderer/control.js"></script>
  </body>
</html>

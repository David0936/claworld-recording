<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClawCast Region Selector</title>
    <link rel="stylesheet" href="../styles/region.css" />
  </head>
  <body>
    <div class="shade"></div>
    <div class="selection" id="selection"></div>
    <div class="hud">
      <strong>拖拽框选录制区域</strong>
      <span>松开后可确认，按 Esc 取消</span>
    </div>
    <div class="actions" id="actions">
      <button id="confirm" type="button">使用这个区域</button>
      <button id="reset" type="button">重选</button>
      <button id="cancel" type="button">取消</button>
    </div>
    <script src="../renderer/region.js"></script>
  </body>
</html>
